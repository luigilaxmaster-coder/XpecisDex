<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chameleon 5 — Voxel Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0c10; font-family: 'Inter', 'Segoe UI', sans-serif; }
  #info {
    position: absolute; top: 16px; left: 16px; z-index: 10;
    color: #c0d8c0; font-size: 13px; pointer-events: none;
    text-shadow: 0 1px 4px rgba(0,0,0,.7);
  }
  #info h1 { font-size: 18px; color: #9BCB3D; margin-bottom: 4px; }
  #info p { opacity: .7; }
  #stats {
    position: absolute; bottom: 16px; left: 16px; z-index: 10;
    color: #8ED9E6; font-size: 12px; pointer-events: none;
    text-shadow: 0 1px 4px rgba(0,0,0,.7);
  }
  canvas { display: block; }
</style>
</head>
<body>
<div id="info">
  <h1>Chameleon 5</h1>
  <p>Drag to rotate &middot; Scroll to zoom &middot; Right-drag to pan</p>
</div>
<div id="stats">Loading&hellip;</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---  Palette from the generator  ---
const PALETTE = {
  1:  [155,203, 61],  2:  [201,217, 58],  3:  [ 63,127, 54],  4:  [ 36, 87, 46],
  5:  [220,233, 90],  6:  [142,217,230],  7:  [ 75,168,184],  8:  [183, 71, 50],
  9:  [106, 31, 29], 10:  [  8,  6,  4], 11:  [246,244,232], 12:  [242,231,138],
  13: [ 94, 68, 44], 14:  [139, 62, 47], 15:  [ 75, 42, 31], 16:  [230,216, 80],
  17: [185,230, 90], 18:  [ 28, 26, 22], 19:  [ 28, 22, 20], 20:  [ 58, 42, 34],
  21: [ 90, 64, 50],
};

// --- Parse .vox ---
async function loadVox(url) {
  const buf = await (await fetch(url)).arrayBuffer();
  const view = new DataView(buf);
  let off = 8; // skip "VOX " + version
  const voxels = [];
  let sx=0, sy=0, sz=0;
  while (off < buf.byteLength) {
    const id = String.fromCharCode(view.getUint8(off), view.getUint8(off+1), view.getUint8(off+2), view.getUint8(off+3));
    const chunkSize = view.getUint32(off+4, true);
    const childSize = view.getUint32(off+8, true);
    off += 12;
    if (id === 'SIZE') { sx = view.getUint32(off,true); sy = view.getUint32(off+4,true); sz = view.getUint32(off+8,true); }
    if (id === 'XYZI') {
      const n = view.getUint32(off, true);
      for (let i = 0; i < n; i++) {
        const base = off + 4 + i * 4;
        voxels.push({ x: view.getUint8(base), y: view.getUint8(base+1), z: view.getUint8(base+2), c: view.getUint8(base+3) });
      }
    }
    off += chunkSize;
  }
  return { sx, sy, sz, voxels };
}

// --- Scene ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1a0a);
scene.fog = new THREE.FogExp2(0x0a1a0a, 0.0035);

const camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 1, 2000);
camera.position.set(160, -120, 140);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(64, 36, 40);
controls.update();

// Lighting
const amb = new THREE.AmbientLight(0x667766, 0.6);
scene.add(amb);
const sun = new THREE.DirectionalLight(0xfff8e0, 1.8);
sun.position.set(120, -80, 200);
sun.castShadow = true;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x8ED9E6, 0.4);
fill.position.set(-60, 100, 60);
scene.add(fill);
const rim = new THREE.DirectionalLight(0x9BCB3D, 0.35);
rim.position.set(-40, -60, 120);
scene.add(rim);

// Ground plane
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(600, 600),
  new THREE.MeshStandardMaterial({ color: 0x0d1a0d, roughness: 0.95 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.set(64, 36, -2);
ground.rotation.set(0, 0, 0);
ground.receiveShadow = true;
scene.add(ground);

// --- Load and render ---
loadVox('chameleon5.vox').then(({ sx, sy, sz, voxels }) => {
  document.getElementById('stats').textContent =
    `${voxels.length.toLocaleString()} voxels  |  ${sx}×${sy}×${sz} grid`;

  // Group by colour for instanced rendering
  const byColor = {};
  for (const v of voxels) {
    (byColor[v.c] ??= []).push(v);
  }

  const geo = new THREE.BoxGeometry(1, 1, 1);
  for (const [cidx, list] of Object.entries(byColor)) {
    const rgb = PALETTE[cidx] || [128, 128, 128];
    const color = new THREE.Color(rgb[0]/255, rgb[1]/255, rgb[2]/255);
    // sRGB to linear
    color.convertSRGBToLinear();
    const mat = new THREE.MeshStandardMaterial({
      color, roughness: 0.72, metalness: 0.05
    });
    const mesh = new THREE.InstancedMesh(geo, mat, list.length);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    const dummy = new THREE.Object3D();
    list.forEach((v, i) => {
      dummy.position.set(v.x, v.y, v.z);
      dummy.updateMatrix();
      mesh.setMatrixAt(i, dummy.matrix);
    });
    scene.add(mesh);
  }
});

// --- Resize ---
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// --- Animate ---
(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
